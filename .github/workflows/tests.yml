name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install pytest tqdm

    - name: Run legacy unit tests
      run: |
        python tests/test_end_to_end.py

    - name: Run v5 self-test (bit-perfect)
      run: |
        python phase1_inr_compressor/siren_v5_torch.py

    - name: Run v5.2 atlas self-test
      run: |
        python phase1_inr_compressor/siren_v5_atlas.py

    - name: Run pytest suite
      run: |
        pytest tests/test_v5_pytest.py tests/test_atlas_pytest.py -v --tb=short
